<!DOCTYPE html>
<html lang="es" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Body Build App</title>
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f0f11">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e22;
    --bg4: #26262c;
    --border: #2e2e36;
    --border2: #3a3a44;
    --text: #f0eff4;
    --text2: #9998a8;
    --text3: #5a5968;
    --accent: #7c6af7;
    --accent2: #9d8fff;
    --accent-bg: #7c6af718;
    --green: #34d27b;
    --green-bg: #34d27b18;
    --red: #f06565;
    --red-bg: #f0656518;
    --amber: #f0b134;
    --amber-bg: #f0b13418;
    --r: 10px;
    --r2: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* ── Header ── */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header-left .subtitle {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }
  .whoop-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    transition: all .2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .whoop-pill:hover { border-color: var(--accent); color: var(--accent2); }
  .whoop-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .whoop-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .whoop-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .whoop-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* Whoop panel */
  .whoop-panel {
    margin: 12px 20px 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    max-height: 0;
    transition: max-height .3s ease, padding .3s;
  }
  .whoop-panel.open { max-height: 300px; }
  .whoop-inner { padding: 16px; }
  .whoop-inner h3 { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
  .recovery-btns { display: flex; gap: 8px; margin-bottom: 14px; }
  .rec-btn {
    flex: 1; padding: 10px; border-radius: var(--r); border: 1px solid var(--border2);
    background: var(--bg4); color: var(--text2); font-family: inherit; font-size: 13px;
    font-weight: 500; cursor: pointer; text-align: center; transition: all .2s;
  }
  .rec-btn:hover { border-color: var(--border2); }
  .rec-btn.active-green { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .rec-btn.active-amber { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
  .rec-btn.active-red { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .recovery-advice {
    font-size: 13px; color: var(--text2); line-height: 1.5;
    padding: 10px 12px; background: var(--bg4); border-radius: var(--r);
    border-left: 3px solid var(--border2); display: none;
  }
  .recovery-advice.show { display: block; }
  .recovery-advice.green { border-color: var(--green); }
  .recovery-advice.amber { border-color: var(--amber); }
  .recovery-advice.red { border-color: var(--red); }

  /* ── Day nav ── */
  .day-nav {
    display: flex; gap: 6px; padding: 16px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-btn {
    flex-shrink: 0; padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text3); font-family: inherit; font-size: 12px;
    font-weight: 500; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 4px;
  }
  .day-btn:hover { border-color: var(--border2); color: var(--text2); }
  .day-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent2); }
  .day-btn.today { border-color: var(--border2); }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* ── Day header ── */
  .day-header {
    padding: 14px 20px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .day-title { font-size: 16px; font-weight: 600; }
  .day-type-tag {
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    border-radius: 20px; letter-spacing: .3px;
  }
  .tag-gym { background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent); }
  .tag-cf { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .tag-rest { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }

  /* ── Exercise list ── */
  .ex-list { padding: 12px 20px 0; display: flex; flex-direction: column; gap: 8px; }

  .ex-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    transition: border-color .2s;
  }
  .ex-card:hover { border-color: var(--border2); }
  .ex-card.open { border-color: var(--border2); }

  .ex-head {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; cursor: pointer; user-select: none;
  }
  .ex-illus {
    width: 60px; height: 42px; border-radius: 7px;
    background: var(--bg3); flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .ex-illus img { width: 100%; height: 100%; object-fit: cover; }
  .ex-illus svg { width: 100%; height: 100%; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .ex-meta { font-size: 11px; color: var(--text3); }
  .ex-chevron { color: var(--text3); font-size: 10px; transition: transform .25s; flex-shrink: 0; }
  .ex-card.open .ex-chevron { transform: rotate(180deg); }

  .ex-body {
    display: none; padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .ex-card.open .ex-body { display: block; }

  /* Illustration large */
  .illus-large {
    margin: 12px 0; border-radius: var(--r); overflow: hidden;
    background: var(--bg3); display: flex; align-items: center; justify-content: center;
    min-height: 80px;
  }
  .illus-large img { width: 100%; height: auto; display: block; border-radius: var(--r); }
  .illus-large svg { width: 100%; height: auto; }

  /* Tip */
  .ex-tip {
    font-size: 12px; color: var(--text2); line-height: 1.55;
    padding: 9px 11px; background: var(--bg4); border-radius: var(--r);
    border-left: 3px solid var(--accent); margin-bottom: 12px;
  }

  /* Sets table */
  .sets-wrap { margin-bottom: 10px; position: relative; }
  .sets-head {
    display: grid; grid-template-columns: 28px 1fr 1fr 52px 28px;
    gap: 6px; padding: 0 4px 6px;
    font-size: 11px; color: var(--text3); font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 52px 28px;
    gap: 6px; padding: 6px 4px; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .set-row:last-child { border-bottom: none; }
  .set-num { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .inp {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 7px; padding: 6px 8px; font-size: 16px;
    color: var(--text); font-family: 'DM Mono', monospace;
    text-align: center; width: 100%; outline: none; transition: border-color .2s;
  }
  .inp:focus { border-color: var(--accent); }
  .inp::placeholder { color: var(--text3); }
  .inp:disabled { opacity: .45; cursor: default; }
  .inp-prev {
    font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace;
    text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .btn-edit-set {
    background: none; border: none; cursor: pointer; color: var(--text3);
    font-size: 13px; padding: 2px; border-radius: 4px; transition: color .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-edit-set:hover { color: var(--accent2); }
  .btn-edit-set.active { color: var(--accent2); }

  /* Volume bar */
  .volume-wrap {
    margin: 14px 20px 0;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 14px 16px;
  }
  .volume-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .volume-title { font-size: 13px; font-weight: 500; color: var(--text2); }
  .volume-total { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--accent2); font-weight: 500; }
  .volume-rows { display: flex; flex-direction: column; gap: 8px; }
  .volume-row { display: flex; align-items: center; gap: 10px; }
  .volume-label { font-size: 12px; color: var(--text3); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .volume-bar-wrap { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .volume-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; opacity: .7; }
  .volume-count { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); width: 36px; text-align: right; flex-shrink: 0; }

  /* Notes */
  .notes-wrap { margin-bottom: 10px; }
  .notes-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 500; }
  .notes-inp {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 7px; padding: 8px 10px; font-size: 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif; resize: none; outline: none;
    transition: border-color .2s; line-height: 1.5;
  }
  .notes-inp:focus { border-color: var(--accent); }
  .notes-inp::placeholder { color: var(--text3); }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; }
  .btn-save {
    flex: 1; padding: 10px; border-radius: var(--r); border: none;
    background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    letter-spacing: .2px;
  }
  .btn-save:hover { opacity: .85; }
  .btn-save:active { opacity: .7; }
  .btn-timer {
    padding: 10px 14px; border-radius: var(--r);
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text2); font-family: 'DM Mono', monospace; font-size: 13px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .btn-timer:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Timer overlay ── */
  .timer-overlay {
    position: fixed; bottom: 90px; right: 16px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--r2); padding: 16px 18px;
    z-index: 500; min-width: 160px; display: none;
    box-shadow: 0 8px 32px #00000060;
  }
  .timer-overlay.show { display: block; }
  .timer-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 8px; }
  .timer-track { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .timer-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .1s linear; }
  .timer-num {
    font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500;
    text-align: center; letter-spacing: 2px; margin-bottom: 10px; color: var(--text);
  }
  .timer-num.done { color: var(--green); }
  .timer-ctrls { display: flex; gap: 6px; }
  .timer-ctrl {
    flex: 1; padding: 7px; border-radius: 7px; border: 1px solid var(--border2);
    background: var(--bg4); color: var(--text2); font-family: inherit; font-size: 12px;
    cursor: pointer; text-align: center; transition: all .2s;
  }
  .timer-ctrl:hover { border-color: var(--border2); }
  .timer-ctrl.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; z-index: 200; max-width: 480px; margin: 0 auto;
  }
  .nav-btn {
    flex: 1; padding: 12px 8px; display: flex; flex-direction: column;
    align-items: center; gap: 4px; cursor: pointer; background: none;
    border: none; color: var(--text3); font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 500; transition: color .2s;
    letter-spacing: .3px;
  }
  .nav-btn:hover { color: var(--text2); }
  .nav-btn.active { color: var(--accent2); }
  .nav-icon { font-size: 18px; line-height: 1; }

  /* ── Sections ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── History ── */
  .hist-list { padding: 12px 20px 0; display: flex; flex-direction: column; gap: 8px; }
  .hist-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 14px;
  }
  .hist-date { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 10px; font-weight: 500; }
  .hist-ex { margin-bottom: 8px; }
  .hist-ex:last-child { margin-bottom: 0; }
  .hist-ex-name { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    background: var(--bg4); color: var(--text3);
    font-family: 'DM Mono', monospace; border: 1px solid var(--border);
  }
  .chip.pr { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent); }
  .hist-note { font-size: 12px; color: var(--text3); margin-top: 6px; font-style: italic; padding: 6px 8px; background: var(--bg3); border-radius: 6px; }

  /* ── Progress ── */
  .prog-wrap { padding: 12px 20px 0; }
  .prog-select {
    width: 100%; padding: 10px 12px; background: var(--bg3);
    border: 1px solid var(--border2); border-radius: var(--r);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    margin-bottom: 16px; outline: none; cursor: pointer;
  }
  .prog-select:focus { border-color: var(--accent); }
  .prog-select option { background: var(--bg3); }
  .chart {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 16px;
    min-height: 160px; display: flex; align-items: flex-end; gap: 6px;
    overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; min-width: 40px; }
  .bar { background: var(--accent); border-radius: 3px 3px 0 0; min-height: 4px; width: 24px; opacity: .8; transition: height .4s ease; }
  .bar-val { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .bar-date { font-size: 9px; color: var(--text3); text-align: center; line-height: 1.3; }

  .ex-card.saved { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  /* ── Welcome screen ── */
  .welcome {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; padding: 32px 24px; text-align: center;
    transition: opacity .4s, transform .4s;
  }
  .welcome.hide { opacity: 0; transform: translateY(-16px); pointer-events: none; }
  .welcome-logo { font-size: 48px; margin-bottom: 16px; }
  .welcome h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
  .welcome .welcome-date { font-size: 14px; color: var(--text3); margin-bottom: 28px; }
  .welcome-cards { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; margin-bottom: 28px; }
  .welcome-card {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--r2); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; text-align: left;
  }
  .welcome-card-icon { font-size: 22px; flex-shrink: 0; }
  .welcome-card-title { font-size: 13px; font-weight: 500; color: var(--text2); }
  .welcome-card-val { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 1px; }
  .welcome-card.accent { border-color: var(--accent); background: var(--accent-bg); }
  .welcome-card.green  { border-color: var(--green);  background: var(--green-bg); }
  .welcome-card.amber  { border-color: var(--amber);  background: var(--amber-bg); }
  .welcome-card.red    { border-color: var(--red);    background: var(--red-bg); }
  .btn-start {
    width: 100%; max-width: 320px; padding: 14px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--r2); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    letter-spacing: .2px;
  }
  .btn-start:hover { opacity: .85; }

  /* ── Fill-all inline pill ── */
  .fill-pill {
    position: absolute; z-index: 900;
    background: var(--bg3); border: 1px solid var(--accent);
    border-radius: 20px; padding: 6px 10px 6px 12px;
    display: none; align-items: center; gap: 8px;
    box-shadow: 0 4px 16px #00000050;
    white-space: nowrap; font-size: 12px; color: var(--text2);
    animation: pillIn .15s ease;
  }
  .fill-pill.show { display: flex; }
  @keyframes pillIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .fill-pill-yes {
    padding: 4px 10px; border-radius: 14px; border: none;
    background: var(--accent); color: #fff; font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .fill-pill-no {
    background: none; border: none; color: var(--text3);
    font-size: 16px; cursor: pointer; line-height: 1; padding: 0 2px;
  }
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 14px; line-height: 1.7;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); padding: 9px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 500; opacity: 0;
    transition: all .25s; pointer-events: none; z-index: 600;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Section padding fix for bottom nav */
  #sec-today, #sec-routine, #sec-history, #sec-progress {
    padding-bottom: 20px;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Body Build App</h1>
      <div class="subtitle" id="header-subtitle">Cargando...</div>
    </div>
    <button class="whoop-pill" onclick="toggleWhoop()" id="whoop-pill">
      <div class="whoop-dot" id="whoop-dot"></div>
      <span id="whoop-label">Recovery</span>
    </button>
  </div>

  <!-- Whoop panel -->
  <div class="whoop-panel" id="whoop-panel">
    <div class="whoop-inner">
      <h3>Recovery score de hoy (Whoop)</h3>
      <div class="recovery-btns">
        <button class="rec-btn" id="rb-green" onclick="setRecovery('green')">🟢 Alto</button>
        <button class="rec-btn" id="rb-amber" onclick="setRecovery('amber')">🟡 Medio</button>
        <button class="rec-btn" id="rb-red"   onclick="setRecovery('red')">🔴 Bajo</button>
      </div>
      <div class="recovery-advice" id="recovery-advice"></div>
    </div>
  </div>

  <!-- Today section -->
  <div class="section active" id="sec-today">
    <div class="day-header">
      <div class="day-title" id="today-title">—</div>
      <div class="day-type-tag" id="today-tag"></div>
    </div>
    <!-- Volume indicator -->
  <div id="today-volume"></div>
  <div class="ex-list" id="today-list"></div>
  </div>

  <!-- Routine section -->
  <div class="section" id="sec-routine">
    <div class="day-nav" id="day-nav"></div>
    <div class="day-header">

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDU374whqqeDc-_Z3IkZ8NPZdUZxRokT_c",
  authDomain: "body-build-app.firebaseapp.com",
  projectId: "body-build-app",
  storageBucket: "body-build-app.firebasestorage.app",
  messagingSenderId: "1037619164414",
  appId: "1:1037619164414:web:6960763e9f4c49961fe1af"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const USER_DOC = "users/gonzalo";

// ── State ────────────────────────────────────────────────────────────────────
let logs = {};
let recovery = null;
let currentSection = 'today';
let currentRoutineDay = null;
let whoopOpen = false;
let saveTimeout = null;

function today() { return new Date().toISOString().slice(0,10); }

async function loadData() {
  // Load from Firestore, fallback to localStorage while offline
  try {
    const snap = await getDoc(doc(db, USER_DOC));
    if (snap.exists()) {
      const data = snap.data();
      logs = data.logs || {};
      const r = (data.recovery || {})[today()];
      if (r) recovery = r;
    }
  } catch(e) {
    // Offline fallback
    try {
      const d = localStorage.getItem('gw_logs_v3');
      if (d) logs = JSON.parse(d);
      const r = localStorage.getItem('gw_recovery_' + today());
      if (r) recovery = r;
    } catch(e2) { logs = {}; }
  }
  // Always mirror to localStorage as offline cache
  try { localStorage.setItem('gw_logs_v3', JSON.stringify(logs)); } catch(e) {}
}

async function saveData() {
  // Debounce saves — wait 800ms after last call before writing
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    // Save to localStorage immediately as cache
    try { localStorage.setItem('gw_logs_v3', JSON.stringify(logs)); } catch(e) {}
    // Save to Firestore
    try {
      const recoveryData = {};
      if (recovery) recoveryData[today()] = recovery;
      await setDoc(doc(db, USER_DOC), { logs, recovery: recoveryData }, { merge: true });
    } catch(e) {
      console.warn('Firestore save failed, data cached locally:', e);
    }
  }, 800);
}

// ── Whoop ────────────────────────────────────────────────────────────────────

  document.getElementById('whoop-panel').classList.toggle('open', whoopOpen);
}
function setRecovery(level) {

}

// ── Timer ────────────────────────────────────────────────────────────────────
let timerState = { running:false, total:60, remaining:60, iv:null };
function startTimer(secs) {
  clearInterval(timerState.iv);
  timerState = { running:true, total:secs, remaining:secs, iv:null };
  document.getElementById('timer-overlay').classList.add('show');
  document.getElementById('timer-toggle').textContent = 'Pausar';
  document.getElementById('timer-num').classList.remove('done');
  updateTimerDisplay();
  timerState.iv = setInterval(() => {
    if (!timerState.running) return;
    timerState.remaining--;
    updateTimerDisplay();
    if (timerState.remaining <= 0) {
      clearInterval(timerState.iv);
      timerState.running = false;
      document.getElementById('timer-num').textContent = '¡Listo!';
      document.getElementById('timer-num').classList.add('done');
      document.getElementById('timer-bar').style.width = '0%';
      document.getElementById('timer-toggle').textContent = 'Cerrar';
      // Vibrate on supported devices (Android)
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      // Beep sound via Web Audio API (works on iOS + Android)
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.18, 0.36].forEach(t => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
          osc.start(ctx.currentTime + t);
          osc.stop(ctx.currentTime + t + 0.15);
        });
      } catch(e) {}
    }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timerState.remaining/60);
  const s = timerState.remaining%60;
  document.getElementById('timer-num').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer-bar').style.width = (timerState.remaining/timerState.total*100)+'%';
}
function toggleTimer() {
  if (timerState.remaining<=0) { stopTimer(); return; }
  timerState.running = !timerState.running;
  document.getElementById('timer-toggle').textContent = timerState.running ? 'Pausar' : 'Reanudar';
}
function stopTimer() {
  clearInterval(timerState.iv);
  timerState.running = false;
  document.getElementById('timer-overlay').classList.remove('show');
}

// ── Render helpers ────────────────────────────────────────────────────────────
function tagEl(type) {
  const cls = {gym:'tag-gym',crossfit:'tag-cf',rest:'tag-rest'}[type]||'tag-rest';
  const lbl = {gym:'Gym 🏋️',crossfit:'CrossFit ⚡',rest:'Descanso 😴'}[type]||'';
  return `<div class="day-type-tag ${cls}">${lbl}</div>`;
}

function renderExList(exercises, dayKey, container, titleEl, tagEl2) {
  const info = ROUTINE[dayKey];
  if (titleEl) titleEl.textContent = info.label;
  if (tagEl2) tagEl2.innerHTML = tagEl(info.type);
  if (!exercises || !exercises.length) {
    const msgs = {
      crossfit: `<div class="empty-state"><div class="icon">⚡</div>Día de CrossFit<br><small>¡A entrenar en el box!</small></div>`,
      rest: `<div class="empty-state"><div class="icon">😴</div>Día de descanso<br><small>Recuperate bien, hidratate y dormí.</small></div>`,
    };
    container.innerHTML = msgs[info.type] || msgs.rest;
    return;
  }
  const td = today();
  container.innerHTML = exercises.map(ex => {
    const prevSessions = Object.keys(logs)
      .filter(k => k.startsWith(ex.id+'_') && !k.endsWith(td) && !k.startsWith('notes_'))
      .sort().reverse();
    const prevLog = prevSessions.length ? logs[prevSessions[0]] : null;
    const existingNote = logs[`notes_${ex.id}_${td}`] || '';
    // Check if this exercise has saved data today (inputs start locked)
    const hasSaved = !!(logs[`${ex.id}_${td}`] && logs[`${ex.id}_${td}`].some(s => s.w || s.r));
    const setsRows = Array.from({length:ex.sets},(_,si) => {
      const existing = logs[`${ex.id}_${td}`] ? logs[`${ex.id}_${td}`][si] : null;
      const prev = prevLog ? prevLog[si] : null;
      const disabled = hasSaved ? 'disabled' : '';
      return `<div class="set-row" id="setrow_${ex.id}_${si}">
        <div class="set-num">${si+1}</div>
        <input class="inp" type="number" placeholder="kg" id="w_${ex.id}_${si}" value="${existing&&existing.w?existing.w:''}" min="0" step="0.5" ${disabled} oninput="onSetInput('${ex.id}',${si},'w',this.value,${ex.sets})">
        <input class="inp" type="number" placeholder="reps" id="r_${ex.id}_${si}" value="${existing&&existing.r?existing.r:''}" min="0" ${disabled} oninput="onSetInput('${ex.id}',${si},'r',this.value,${ex.sets})">
        <div class="inp-prev">${prev&&prev.w?prev.w+'×'+prev.r:'—'}</div>
        <button class="btn-edit-set" onclick="toggleEditSet('${ex.id}',${si})" title="Editar">✏️</button>
      </div>`;
    }).join('');
    const imgHtml = ex.img
      ? `<div class="illus-large">
          <img src="${ex.img}" alt="${ex.name} inicio" style="width:50%;border-radius:var(--r) 0 0 var(--r)" onerror="this.parentElement.style.display='none'">
          <img src="${ex.img2||ex.img}" alt="${ex.name} final" style="width:50%;border-radius:0 var(--r) var(--r) 0" onerror="this.style.display='none'">
        </div>`
      : '';
    const thumbHtml = ex.img
      ? `<img src="${ex.img}" alt="" onerror="this.style.display='none'">`
      : '';
    return `<div class="ex-card${hasSaved?' saved':''}" id="card_${ex.id}">
      <div class="ex-head" onclick="toggleEx('${ex.id}')">
        <div class="ex-illus">${thumbHtml}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.detail}</div>
        </div>
        <div class="ex-chevron">▼</div>
      </div>
      <div class="ex-body">
        ${imgHtml}
        <div class="ex-tip">💡 ${ex.tip}</div>
        <div class="sets-wrap">
          <div class="sets-head"><div>#</div><div>Peso</div><div>Reps</div><div style="text-align:right">Ant.</div><div></div></div>
          ${setsRows}
        </div>
        <div class="notes-wrap">
          <div class="notes-label">Notas de la serie</div>
          <textarea class="notes-inp" id="note_${ex.id}" rows="2" placeholder="Sensaciones, ajustes, próxima vez...">${existingNote}</textarea>
        </div>
        <div class="btn-row">
          <button class="btn-save" onclick="saveEx('${ex.id}',${ex.sets})">Guardar</button>
          <button class="btn-timer" onclick="startTimer(${ex.rest})">⏱ ${ex.rest >= 60 ? (ex.rest/60)+'min' : ex.rest+'s'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleEx(id) {
  const target = document.getElementById('card_'+id);
  const isOpen = target.classList.contains('open');
  // Close all open cards first (accordion)
  document.querySelectorAll('.ex-card.open').forEach(c => c.classList.remove('open'));
  // If it wasn't open, open it
  if (!isOpen) target.classList.add('open');
}

function saveEx(exId, numSets) {
  const td = today();
  const sets = Array.from({length:numSets},(_,i) => ({
    w: document.getElementById(`w_${exId}_${i}`)?.value || '',
    r: document.getElementById(`r_${exId}_${i}`)?.value || '',
  }));
  logs[`${exId}_${td}`] = sets;
  const note = document.getElementById(`note_${exId}`)?.value || '';
  if (note.trim()) logs[`notes_${exId}_${td}`] = note.trim();
  else delete logs[`notes_${exId}_${td}`];
  saveData();
  toast('✓ Guardado');
  // Highlight saved card
  const card = document.getElementById('card_'+exId);
  if (card) card.classList.add('saved');
  // Refresh volume
  renderVolumeWidget('today-volume');
}

// ── Edit single set ───────────────────────────────────────────────────────────
function toggleEditSet(exId, si) {
  const wInp = document.getElementById(`w_${exId}_${si}`);
  const rInp = document.getElementById(`r_${exId}_${si}`);
  const btn  = document.querySelector(`#setrow_${exId}_${si} .btn-edit-set`);
  if (!wInp) return;
  const isLocked = wInp.disabled;
  wInp.disabled = !isLocked;
  rInp.disabled = !isLocked;
  if (btn) btn.classList.toggle('active', isLocked);
  if (isLocked) wInp.focus();
}

// ── Weekly volume ─────────────────────────────────────────────────────────────
function getWeekStart() {
  const d = new Date();
  const day = d.getDay(); // 0=Sun
  const diff = (day === 0) ? -6 : 1 - day; // Monday
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon.toISOString().slice(0,10);
}

function renderVolumeWidget(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const weekStart = getWeekStart();

  // Count sets per exercise this week
  const allExercises = ['Mar','Jue'].flatMap(d => ROUTINE[d].exercises || []);
  const volumeData = allExercises.map(ex => {
    const weekKeys = Object.keys(logs).filter(k =>
      k.startsWith(ex.id+'_') && !k.startsWith('notes_') &&
      k.split('_').pop() >= weekStart
    );
    const sets = weekKeys.reduce((acc, k) => {
      return acc + (logs[k] || []).filter(s => s.w || s.r).length;
    }, 0);
    return { name: ex.name, sets, target: ex.sets * 2 }; // 2 sessions/week target
  }).filter(d => d.sets > 0);

  if (!volumeData.length) {
    container.innerHTML = '';
    return;
  }

  const totalSets = volumeData.reduce((a,b) => a + b.sets, 0);
  const maxSets = Math.max(...volumeData.map(d => d.sets));

  container.innerHTML = `
    <div class="volume-wrap">
      <div class="volume-header">
        <div class="volume-title">📊 Volumen esta semana</div>
        <div class="volume-total">${totalSets} series</div>
      </div>
      <div class="volume-rows">
        ${volumeData.map(d => `
          <div class="volume-row">
            <div class="volume-label">${d.name}</div>
            <div class="volume-bar-wrap">
              <div class="volume-bar-fill" style="width:${Math.round((d.sets/maxSets)*100)}%"></div>
            </div>
            <div class="volume-count">${d.sets}/${d.target}</div>
          </div>`).join('')}
      </div>
    </div>`;
}


let fillPending = null;
let fillDebounce = null;

function onSetInput(exId, setIdx, field, value, numSets) {
  if (setIdx !== 0 || !value) { dismissFill(); return; }
  clearTimeout(fillDebounce);
  fillDebounce = setTimeout(() => {
    const othersEmpty = Array.from({length:numSets},(_,i)=>i)
      .filter(i => i !== 0)
      .some(i => {
        const el = document.getElementById(`${field}_${exId}_${i}`);
        return el && !el.value;
      });
    if (!othersEmpty) return;
    fillPending = { exId, field, value, numSets };
    const pill = document.getElementById('fill-pill');
    const triggerEl = document.getElementById(`${field}_${exId}_0`);
    if (triggerEl && pill) {
      const rect = triggerEl.getBoundingClientRect();
      pill.style.position = 'fixed';
      pill.style.top = (rect.bottom + 6) + 'px';
      pill.style.left = rect.left + 'px';
    }
    const label = field === 'w' ? `${value}kg a todas` : `${value} reps a todas`;
    document.getElementById('fill-pill-text').textContent = label;
    pill.classList.add('show');
  }, 500);
}

function confirmFill() {
  if (!fillPending) return;
  const { exId, field, value, numSets } = fillPending;
  Array.from({length:numSets},(_,i)=>i).forEach(i => {
    const el = document.getElementById(`${field}_${exId}_${i}`);
    if (el && !el.value) el.value = value;
  });
  dismissFill();
}

function dismissFill() {
  fillPending = null;
  clearTimeout(fillDebounce);
  const pill = document.getElementById('fill-pill');
  if (pill) pill.classList.remove('show');
}

// ── Welcome screen ────────────────────────────────────────────────────────────
function showWelcome() {
  const dk = DAYS_IDX[new Date().getDay()];
  const info = ROUTINE[dk];
  const d = new Date();
  document.getElementById('welcome-date').textContent =
    d.toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});

  const typeLabel = {gym:'Gym 🏋️', crossfit:'CrossFit ⚡', rest:'Descanso 😴'}[info.type];
  const typeClass = {gym:'accent', crossfit:'green', rest:''}[info.type] || '';

  // Recovery card
  const recLabels = {green:'Alto 🟢', amber:'Medio 🟡', red:'Bajo 🔴'};
  const recClass  = recovery || '';
  const recVal    = recovery ? recLabels[recovery] : 'No registrado';

  // Last gym session summary
  const gymDays = ['Mar','Jue'];
  const allExIds = gymDays.flatMap(day => (ROUTINE[day].exercises||[]).map(e=>e.id));
  const lastSession = Object.keys(logs)
    .filter(k => !k.startsWith('notes_') && allExIds.some(id => k.startsWith(id+'_')))
    .sort().reverse()[0];
  const lastDate = lastSession ? lastSession.split('_').pop() : null;

  document.getElementById('welcome-cards').innerHTML = `
    <div class="welcome-card ${typeClass}">
      <div class="welcome-card-icon">${info.type==='gym'?'🏋️':info.type==='crossfit'?'⚡':'😴'}</div>
      <div>
        <div class="welcome-card-title">Entrenamiento de hoy</div>
        <div class="welcome-card-val">${info.label}</div>
      </div>
    </div>
    <div class="welcome-card ${recClass}">
      <div class="welcome-card-icon">💓</div>
      <div>
        <div class="welcome-card-title">Recovery Whoop</div>
        <div class="welcome-card-val">${recVal}</div>
      </div>
    </div>
    ${lastDate ? `<div class="welcome-card">
      <div class="welcome-card-icon">📆</div>
      <div>
        <div class="welcome-card-title">Último entreno registrado</div>
        <div class="welcome-card-val">${lastDate}</div>
      </div>
    </div>` : ''}
  `;
}

function dismissWelcome() {
  document.getElementById('welcome').classList.add('hide');
  setTimeout(() => document.getElementById('welcome').style.display='none', 400);
}


function renderToday() {
  const dk = DAYS_IDX[new Date().getDay()];
  const info = ROUTINE[dk];
  const d = new Date();
  document.getElementById('header-subtitle').textContent =
    d.toLocaleDateString('es-AR', {weekday:'long',day:'numeric',month:'long'});
  renderExList(
    info.exercises, dk,
    document.getElementById('today-list'),
    document.getElementById('today-title'),
    document.getElementById('today-tag'),
  );
  renderVolumeWidget('today-volume');
}

// ── Routine ──────────────────────────────────────────────────────────────────
function renderDayNav(active) {
  const todayKey = DAYS_IDX[new Date().getDay()];
  const nav = document.getElementById('day-nav');
  nav.innerHTML = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => {
    const info = ROUTINE[d];
    const icon = {gym:'🏋️',crossfit:'⚡',rest:'😴'}[info.type]||'';
    const isToday = d === todayKey;
    return `<button class="day-btn ${d===active?'active':''} ${isToday?'today':''}" onclick="renderRoutine('${d}')">
      ${isToday?'<div class="day-dot"></div>':''}${d} ${icon}
    </button>`;
  }).join('');
}
function renderRoutine(dk) {
  currentRoutineDay = dk;
  renderDayNav(dk);
  renderExList(
    ROUTINE[dk].exercises, dk,
    document.getElementById('routine-list'),
    document.getElementById('routine-title'),
    document.getElementById('routine-tag'),
  );
}

// ── History ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const c = document.getElementById('hist-list');
  const dataKeys = Object.keys(logs).filter(k => !k.startsWith('notes_')).sort().reverse();
  if (!dataKeys.length) {
    c.innerHTML = '<div class="empty-state"><div class="icon">📆</div>Todavía no hay registros.<br><small>Empezá a registrar tus series.</small></div>';
    return;
  }
  const byDate = {};
  dataKeys.forEach(k => {
    const parts = k.split('_'); const date = parts.pop(); const exId = parts.join('_');
    if (!byDate[date]) byDate[date] = {};
    byDate[date][exId] = logs[k];
  });
  c.innerHTML = Object.keys(byDate).sort().reverse().map(date => {
    const exEntries = Object.entries(byDate[date]);
    const exHtml = exEntries.map(([exId, sets]) => {
      const name = ALL_EX[exId]?.name || exId;
      const prevSessions = Object.keys(logs)
        .filter(k => k.startsWith(exId+'_') && !k.includes(date) && !k.startsWith('notes_'))
        .sort().reverse();
      const prevMax = prevSessions.length
        ? Math.max(...(logs[prevSessions[0]]||[]).map(s=>parseFloat(s.w)||0)) : 0;
      const chips = sets.map(s => {
        if (!s.w && !s.r) return '';
        const isPR = parseFloat(s.w) > prevMax && prevMax > 0;
        return `<span class="chip ${isPR?'pr':''}">${s.w||'?'}kg×${s.r||'?'}${isPR?' 🏆':''}</span>`;
      }).filter(Boolean).join('');
      if (!chips) return '';
      const note = logs[`notes_${exId}_${date}`];
      const noteHtml = note ? `<div class="hist-note">"${note}"</div>` : '';
      return `<div class="hist-ex"><div class="hist-ex-name">${name}</div><div class="chips">${chips}</div>${noteHtml}</div>`;
    }).filter(Boolean).join('');
    if (!exHtml) return '';
    return `<div class="hist-card"><div class="hist-date">${date}</div>${exHtml}</div>`;
  }).filter(Boolean).join('') || '<div class="empty-state">No hay registros con datos.</div>';
}

// ── Progress ─────────────────────────────────────────────────────────────────
function renderProgressSelects() {
  const s = document.getElementById('prog-select');
  s.innerHTML = '<option value="">Seleccioná un ejercicio...</option>' +
    ['Mar','Jue'].flatMap(d => ROUTINE[d].exercises||[])
      .map(e => `<option value="${e.id}">${e.name}</option>`).join('');
}
function renderProgress() {
  const exId = document.getElementById('prog-select').value;
  const chart = document.getElementById('prog-chart');
  if (!exId) { chart.innerHTML = '<div class="empty-state" style="width:100%">Seleccioná un ejercicio</div>'; return; }
  const sessions = Object.keys(logs)
    .filter(k => k.startsWith(exId+'_') && !k.startsWith('notes_'))
    .sort();
  if (!sessions.length) { chart.innerHTML = '<div class="empty-state" style="width:100%">Sin registros aún para este ejercicio</div>'; return; }
  const data = sessions.map(k => ({
    date: k.split('_').pop().slice(5),
    val: Math.max(...(logs[k]||[]).map(s=>parseFloat(s.w)||0))
  })).filter(d=>d.val>0);
  if (!data.length) { chart.innerHTML = '<div class="empty-state" style="width:100%">Registrá pesos para ver el progreso</div>'; return; }
  const maxVal = Math.max(...data.map(d=>d.val));
  chart.innerHTML = data.map(d=>`
    <div class="bar-group">
      <div class="bar-val">${d.val}kg</div>
      <div class="bar" style="height:${Math.max(8,Math.round((d.val/maxVal)*120))}px"></div>
      <div class="bar-date">${d.date}</div>
    </div>`).join('');
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('header-subtitle').textContent = 'Cargando datos...';
  await loadData();
  initWhoop();
  showWelcome();
  renderToday();
  renderDayNav(DAYS_IDX[new Date().getDay()]);
}

window.renderProgress = renderProgress;
window.onSetInput     = onSetInput;
window.confirmFill    = confirmFill;
window.dismissFill    = dismissFill;

init();
</script>
